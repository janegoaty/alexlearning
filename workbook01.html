<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Year 5–7 Maths Bridge Practice</title>
<style>
:root {
  --bg:#FFF6ED; --card:#fff; --ink:#1f2328; --muted:#7a8394; --line:#e4e8f0;
  --accent:#3b5bdb; --good:#16803c; --bad:#b42318; --warn:#946200; --soft:#eef2ff;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif}
header{background:var(--card);border-bottom:2px solid #FFE0C2;padding:18px 22px;position:sticky;top:0;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.05)}
h1{font-size:1.6rem;font-weight:800;margin:0 0 6px}
.sub{color:var(--muted);font-size:1rem;line-height:1.4;font-weight:500}
main{max-width:1000px;margin:22px auto;padding:0 16px 50px}
.panel,.section,.summary{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.panel{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
select,button,input[type=text],input[type=number]{font:inherit;border:2px solid var(--line);border-radius:12px;padding:10px 13px;background:#fff;font-size:1rem}
button{cursor:pointer;background:var(--accent);color:white;border-color:var(--accent);font-weight:700;border-radius:14px;padding:10px 18px;transition:opacity .15s}
button:hover{opacity:.88}
button.secondary{background:#fff;color:var(--ink);border-color:var(--line);font-weight:600}
button.danger{background:#fff;color:var(--bad);border-color:#efb7b2;font-weight:600}
button.tricky{border-color:var(--warn); color:var(--warn); background:#FFF9F2;}
.score{margin-left:auto;font-weight:800;font-size:1.05rem}
.progress{height:12px;background:#FFE8D0;border-radius:999px;overflow:hidden;margin-top:12px}
.bar{height:100%;width:0%;background:var(--accent);border-radius:999px;transition: width 0.3s ease;}
h2{font-size:1.35rem;font-weight:800;margin:0 0 14px}
.q{border-top:2px solid var(--line);padding:18px 0}
.q:first-of-type{border-top:none}
.q.faded{opacity:.42}
.q.retry-target{background:#FFF7F6;border:2px solid #F3B7B0;border-radius:16px;padding:16px;margin:10px 0}
.retry-box{margin-top:12px;padding:12px 14px;border-radius:14px;background:#fff;border:2px dashed #F3B7B0}
.retry-box-title{font-weight:800;color:var(--bad);margin-bottom:8px}
.original-note{font-size:.9rem;color:var(--muted);font-weight:700;margin:8px 0 4px}
.prompt{font-size:1.1rem;line-height:1.55;margin-bottom:12px;font-weight:500}
.qid{color:var(--accent);font-weight:800;margin-right:7px;font-size:1.1rem}
.answer-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.field{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:5px 0}
.field label{color:var(--muted);font-size:.97rem;font-weight:600}
input[type=text], input[type=number]{min-width:150px}
.choice{display:block;margin:8px 0;padding:11px 14px;border:2px solid var(--line);border-radius:14px;background:#fff;max-width:620px;font-size:1rem;cursor:pointer;transition:border-color .15s}
.choice:hover{border-color:var(--accent)}
.choice input{margin-right:10px}
.feedback{min-height:1.4em;margin-top:10px;font-size:1rem;font-weight:600}
.section-result{margin:8px 0 14px;padding:12px 16px;border-radius:14px;background:#FFF9F2;border:2px solid #FFE0C2;font-size:.97rem;color:var(--muted);font-weight:500}
.section-result.marked{color:var(--ink);font-weight:700}
.correct{color:var(--good);font-weight:700}
.wrong{color:var(--bad);font-weight:700}
.manual{color:var(--warn);font-weight:700}
.hidden{display:none}
.badge{display:inline-block;background:#FFF0E0;color:#a05500;border-radius:999px;padding:2px 10px;font-size:.83rem;margin-left:6px;font-weight:700;border:1px solid #FFD4A8}
.section-submit-row{margin-top:20px;padding-top:18px;border-top:2px solid var(--line)}
.section-submit-btn{width:100%;padding:14px;font-size:1.05rem;font-weight:800;border-radius:16px;background:var(--accent);color:#fff;border:none;cursor:pointer;transition:opacity .15s}
.practice-offer{margin-top:14px;padding:14px 16px;border-radius:14px;background:#eef2ff;border:2px solid #cfd7ff;font-weight:700}
.practice-offer button{margin-top:10px}
</style>
</head>
<body>
<header>
  <h1>🌟 Year 5–7 Maths Bridge Practice</h1>
  <div class="sub">Complete a section, retry mistakes, then practice tricky problems ✓</div>
  <div class="progress"><div class="bar" id="progressBar"></div></div>
</header>
<main>
  <div class="panel">
    <label for="sectionSelect">Section:</label>
    <select id="sectionSelect"></select>
    <button id="showAllBtn" class="secondary">Show all</button>
    <button id="trickyBtn" class="secondary tricky">🧠 Tricky Practice</button>
    <button id="resetBtn" class="danger">Clear Data</button>
    <div class="score" id="score">Marked score: 0/0</div>
  </div>
  <div id="sectionWrap"></div>
</main>

<script>
// ==========================================
// 1. STATE & STORAGE MANAGEMENT
// ==========================================
const KEY = "math_bridge_v3";
const MARKED_KEY = KEY + "_marked";
const FLOW_KEY = KEY + "_flow";
const RETRY_KEY = KEY + "_retry";
const TRICKY_KEY = KEY + "_tricky"; 
const TRICKY_ANS_KEY = KEY + "_tricky_ans"; // NEW: Isolated bucket for tricky answers

let saved = JSON.parse(localStorage.getItem(KEY) || "{}");
let markedSections = JSON.parse(localStorage.getItem(MARKED_KEY) || "{}");
let retrySaved = JSON.parse(localStorage.getItem(RETRY_KEY) || "{}");
let trickySaved = JSON.parse(localStorage.getItem(TRICKY_ANS_KEY) || "{}"); 
let sectionFlow = JSON.parse(localStorage.getItem(FLOW_KEY) || "{}");
let trickyStats = JSON.parse(localStorage.getItem(TRICKY_KEY) || "{}");

let showAll = false;
let activeQuestions = []; 

function saveState(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function getFlow(section) { return sectionFlow[section] || {stage:"fresh", wrongIds:[]}; }
function setFlow(section, data) { sectionFlow[section] = Object.assign(getFlow(section), data); saveState(FLOW_KEY, sectionFlow); }
function resetFlow(section) { delete sectionFlow[section]; saveState(FLOW_KEY, sectionFlow); }

function getVal(id) { return saved[id] ?? ""; }
function setVal(id, val) { saved[id] = val; saveState(KEY, saved); updateProgress(); }
function getRetryVal(id) { return retrySaved[id] ?? ""; }
function setRetryVal(id, val) { retrySaved[id] = val; saveState(RETRY_KEY, retrySaved); }
function clearRetryAnswer(id) { delete retrySaved[id]; saveState(RETRY_KEY, retrySaved); }

// NEW: Tricky Practice state accessors
function getTrickyVal(id) { return trickySaved[id] ?? ""; }
function setTrickyVal(id, val) { trickySaved[id] = val; saveState(TRICKY_ANS_KEY, trickySaved); }

// ==========================================
// 2. TRICKY LEDGER (SPACED REPETITION)
// ==========================================
function recordMistake(baseId) {
  if (!trickyStats[baseId]) trickyStats[baseId] = { score: 0 };
  trickyStats[baseId].score -= 1;
  saveState(TRICKY_KEY, trickyStats);
}

function recordTrickySuccess(baseId) {
  if (trickyStats[baseId]) {
    trickyStats[baseId].score += 1;
    if (trickyStats[baseId].score >= 1) delete trickyStats[baseId];
    saveState(TRICKY_KEY, trickyStats);
  }
}

// ==========================================
// 3. CORE LOGIC & EVALUATION
// ==========================================
function answerText(q){
  if(q.type==="number" || q.type==="fraction") return q.answers.join(" or ");
  if(q.type==="mcq") return q.choices[q.answer];
  if(q.type==="multi"){
    return q.fields.map(f=>{
      if(f.kind==="mcq") return `${f.label}: ${f.choices[f.answer]}`;
      return `${f.label}: ${f.answers.join(" or ")}`;
    }).join("; ");
  }
  return "Parent check";
}

function checkField(field, val){
  if(!val || String(val).trim() === "") return null;
  val = String(val).trim().toLowerCase().replace(/,/g,"").replace(/\$/g,"").replace(/\s+/g," ");
  
  if(field.kind==="number"){
    const n = Number(val);
    return field.answers.some(a => Math.abs(n - Number(a)) < 1e-9);
  }
  if(field.kind==="fraction"){
    let v;
    if(val.includes("/")){
      const [a,b] = val.split("/").map(Number);
      if(!Number.isFinite(a)||!Number.isFinite(b)||b===0) v = NaN; else v = a/b;
    } else {
      v = Number.isFinite(Number(val)) ? Number(val) : NaN;
    }
    const checkFrac = (str) => {
       if(str.includes("/")){ const [n,d]=str.split("/").map(Number); return n/d; } return Number(str);
    };
    return field.answers.some(a => Math.abs(v - checkFrac(a)) < 1e-9);
  }
  if(field.kind==="mcq"){
    return String(val) === String(field.answer);
  }
  return null;
}

function checkQuestionValue(q, value){
  if(q.type==="manual") return value ? "manual" : null;
  if(q.type==="number") return checkField({kind:"number",answers:q.answers}, value);
  if(q.type==="fraction") return checkField({kind:"fraction",answers:q.answers}, value);
  if(q.type==="mcq") return checkField({kind:"mcq",answer:q.answer}, value);
  if(q.type==="multi"){
    const vals = value || {};
    let any=false, all=true;
    q.fields.forEach((f,idx)=>{
      const r = checkField(f, vals[idx]);
      if(r!==null) any=true;
      if(r!==true) all=false;
    });
    return any ? all : null;
  }
  return null;
}

function checkQuestion(q) { return checkQuestionValue(q, getVal(q.id)); }
function checkRetryQuestion(q) { return checkQuestionValue(q, getRetryVal(q.id)); }
function checkTrickyQuestion(q) { return checkQuestionValue(q, getTrickyVal(q.id)); } // NEW
function isAttempted(q) { return q.type==="multi" ? q.fields.some((_,idx)=>getVal(q.id)?.[idx]) : !!getVal(q.id); }

// ==========================================
// 4. UI RENDERING
// ==========================================
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}
const plural = (n, one, many) => n === 1 ? one : many;

// UPDATED: Now uses stateType to cleanly separate "ans", "retry", and "tricky" values
function inputHtml(q, opts={}, stateType="ans"){
  const disabled = opts.disabled ? " disabled" : "";
  const valFn = stateType === "retry" ? getRetryVal : (stateType === "tricky" ? getTrickyVal : getVal);
  
  if(q.type==="number" || q.type==="fraction"){
    return `<input type="text" inputmode="decimal" data-id="${q.id}" data-type="${stateType}" value="${esc(valFn(q.id))}" placeholder="${stateType==='ans'?'Type answer':'New answer'}"${disabled}>`;
  }
  if(q.type==="manual"){
    return `<input type="text" data-id="${q.id}" data-type="${stateType}" value="${esc(valFn(q.id))}" placeholder="Type answer for parent to check"${disabled}>
            <div class="hint">Ask a parent to check this answer.</div>`;
  }
  if(q.type==="mcq"){
    const cur = valFn(q.id);
    return q.choices.map((c,idx)=>`
      <label class="choice">
        <input type="radio" name="${stateType}-${q.id}" data-id="${q.id}" data-type="${stateType}" value="${idx}" ${String(cur)===String(idx)?"checked":""}${disabled}>
        ${esc(c)}
      </label>`).join("");
  }
  if(q.type==="multi"){
    const vals = valFn(q.id) || {};
    return `<div class="answer-row">` + q.fields.map((f,idx)=>{
      if(f.kind==="mcq"){
        const cur = vals[idx] ?? "";
        return `<div class="field"><label>${esc(f.label)}:</label><select data-id="${q.id}" data-idx="${idx}" data-type="${stateType}"${disabled}>
          <option value="">Choose</option>
          ${f.choices.map((c,i)=>`<option value="${i}" ${String(cur)===String(i)?"selected":""}>${esc(c)}</option>`).join("")}
        </select></div>`;
      }
      return `<div class="field"><label>${esc(f.label)}:</label><input type="text" inputmode="decimal" data-id="${q.id}" data-idx="${idx}" data-type="${stateType}" value="${esc(vals[idx] ?? "")}" placeholder="Answer"${disabled}></div>`;
    }).join("") + `</div>`;
  }
}

function render() {
  activeQuestions = JSON.parse(JSON.stringify(QUESTIONS_DATA)); 
  const selected = document.getElementById("sectionSelect").value || SECTIONS[0];
  const wrap = document.getElementById("sectionWrap");
  wrap.innerHTML = "";
  
  SECTIONS.forEach(section => {
    if(!showAll && section !== selected) return;
    const flow = getFlow(section);
    let qs = activeQuestions.filter(q => q.section === section);
    
    const retryIds = new Set(((flow.originalWrongIds && flow.originalWrongIds.length ? flow.originalWrongIds : flow.wrongIds) || []).map(Number));
    
    if(flow.stage === "practice" || flow.stage === "practice_done"){
      const ids = new Set((flow.practiceIds || []).map(Number));
      qs = qs.filter(q => ids.has(q.id));
      qs.forEach(q => { if(SIMILAR_GENERATORS[q.id]) SIMILAR_GENERATORS[q.id](q); });
    }

    const div = document.createElement("section");
    div.className = "section";
    
    const questionsHtml = qs.map(q => {
      const inRetry = flow.stage === "retrying" || flow.stage === "retry_done";
      const isRetryTarget = inRetry && retryIds.has(q.id);
      const cls = inRetry ? (isRetryTarget ? "q retry-target" : "q faded") : "q";
      
      let retryHtml = "";
      if (inRetry && isRetryTarget) {
        const isRetryDone = flow.stage === "retry_done";
        retryHtml = `<div class="original-note">Your first answer is kept above. ${isRetryDone ? 'Here is your retry:' : 'Use the new box below for your retry.'}</div>
                     <div class="retry-box"><div class="retry-box-title">${isRetryDone ? 'Retry answer' : 'Try again'}</div>${inputHtml(q, {disabled: isRetryDone}, "retry")}</div>`;
      }

      return `
      <div class="${cls}" id="q-${q.id}">
        <div class="prompt"><span class="qid">${q.id}.</span>${esc(q.prompt)}${q.type==="manual" ? '<span class="badge">Parent-check</span>' : ''}</div>
        ${inputHtml(q, {disabled: inRetry}, "ans")}
        ${retryHtml}
        <div class="feedback" id="fb-${q.id}"></div>
      </div>`
    }).join("");

    let buttonHtml = "";
    if(flow.stage === "retrying") {
      buttonHtml = `<button class="section-submit-btn action-btn" data-action="retry" data-section="${esc(section)}">Submit retry ✓</button>`;
    } else if(flow.stage === "retry_done" || flow.stage === "practice_done") {
      const remainingWrong = flow.stage === "retry_done" ? flow.stillWrongIds.length : (flow.stillWrongIds || []).length;
      if (remainingWrong > 0) {
        buttonHtml = `<div class="practice-offer">Want to master these specific questions?<br>
          <button class="section-submit-btn action-btn" data-action="practice" data-section="${esc(section)}">Generate targeted practice</button></div>`;
      }
      buttonHtml += `<button class="section-submit-btn secondary action-btn" data-action="reset" data-section="${esc(section)}" style="margin-top:10px">Back to full section</button>`;
    } else if(flow.stage === "practice") {
      buttonHtml = `<button class="section-submit-btn action-btn" data-action="submit-practice" data-section="${esc(section)}">Submit practice ✓</button>`;
    } else {
      buttonHtml = `<button class="section-submit-btn action-btn" data-action="initial" data-section="${esc(section)}">Submit section ✓</button>`;
    }

    div.innerHTML = `<h2>${esc(section)}</h2><div class="section-result" id="result-${SECTIONS.indexOf(section)}">Complete this section, then click ‘Submit section’.</div>${questionsHtml}<div class="section-submit-row">${buttonHtml}</div>`;
    wrap.appendChild(div);
  });

  showMarkedFeedback();
  updateProgress();
  updateScore();
}

function renderTrickyPractice() {
  const wrap = document.getElementById("sectionWrap");
  const trickyIds = Object.keys(trickyStats).map(Number);
  
  if (trickyIds.length === 0) {
    wrap.innerHTML = `
      <section class="section summary" style="text-align: center; padding: 40px 20px;">
        <h2>🎉 Tricky Problem Practice</h2>
        <p class="sub">You have no tricky problems to review right now. Great job!</p>
      </section>`;
    return;
  }

  // NEW: Wipe out the temporary tricky answers whenever we load this view 
  // so that the generated inputs are guaranteed to be blank.
  trickySaved = {};
  saveState(TRICKY_ANS_KEY, trickySaved);

  activeQuestions = trickyIds.map(id => {
    let q = JSON.parse(JSON.stringify(QUESTIONS_DATA.find(x => x.id === id)));
    if (SIMILAR_GENERATORS[id]) SIMILAR_GENERATORS[id](q);
    return q;
  });

  const questionsHtml = activeQuestions.map(q => `
    <div class="q" id="q-${q.id}">
      <div class="prompt"><span class="qid">Target:</span>${esc(q.prompt)}</div>
      ${inputHtml(q, {}, "tricky")} 
      <div class="feedback" id="fb-${q.id}"></div>
    </div>
  `).join("");

  wrap.innerHTML = `
    <section class="section">
      <h2>🧠 Tricky Problem Practice</h2>
      <div class="section-result" id="tricky-result">Complete these specific problem types to master them and remove them from your list.</div>
      ${questionsHtml}
      <div class="section-submit-row">
        <button class="section-submit-btn action-btn" data-action="submit-tricky">Mark Tricky Practice ✓</button>
      </div>
    </section>
  `;
}

// ==========================================
// 5. EVENT DELEGATION
// ==========================================
document.getElementById("sectionWrap").addEventListener("input", e => {
  if(!e.target.dataset.id) return;
  const { id, type, idx } = e.target.dataset;
  const val = e.target.value;
  
  // UPDATED: Route data to the correct namespace
  if(idx !== undefined) {
    let current = (type === "retry" ? getRetryVal(id) : (type === "tricky" ? getTrickyVal(id) : getVal(id))) || {};
    current[idx] = val;
    if (type === "retry") setRetryVal(id, current);
    else if (type === "tricky") setTrickyVal(id, current);
    else setVal(id, current);
  } else {
    if (type === "retry") setRetryVal(id, val);
    else if (type === "tricky") setTrickyVal(id, val);
    else setVal(id, val);
  }
  
  const fb = document.getElementById(`fb-${id}`);
  if(fb && type !== "retry" && type !== "tricky") { fb.className="feedback"; fb.textContent=""; }
});

document.getElementById("sectionWrap").addEventListener("click", e => {
  if (e.target.matches('.action-btn')) {
    const action = e.target.dataset.action;
    const section = e.target.dataset.section;
    
    if (action === "initial") submitInitialSection(section);
    if (action === "retry") submitRetrySection(section);
    if (action === "practice") startPractice(section);
    if (action === "submit-practice") submitPractice(section);
    if (action === "reset") {
      resetFlow(section); markedSections[section]=false; saveState(MARKED_KEY, markedSections); render();
    }
    if (action === "submit-tricky") submitTrickyPractice();
  }
});

// ==========================================
// 6. WORKFLOW ACTIONS
// ==========================================
function submitInitialSection(section) {
  const qs = activeQuestions.filter(q => q.section === section && q.type !== "manual");
  const wrongIds = qs.filter(q => checkQuestion(q) !== true).map(q => q.id);
  
  markedSections[section] = true; saveState(MARKED_KEY, markedSections);
  
  if (wrongIds.length === 0) {
    setFlow(section, { stage: "complete" });
  } else {
    wrongIds.forEach(id => { clearRetryAnswer(id); recordMistake(id); });
    setFlow(section, { stage: "retrying", wrongIds, originalWrongIds: wrongIds, total: qs.length, firstScoreCorrect: qs.length - wrongIds.length });
  }
  render();
}

function submitRetrySection(section) {
  const flow = getFlow(section);
  const ids = flow.originalWrongIds || flow.wrongIds;
  const qs = activeQuestions.filter(q => ids.includes(q.id));
  const stillWrong = qs.filter(q => checkRetryQuestion(q) !== true).map(q => q.id);
  
  setFlow(section, { stage: "retry_done", stillWrongIds: stillWrong, retryScoreCorrect: flow.firstScoreCorrect + (ids.length - stillWrong.length) });
  render();
}

function startPractice(section) {
  const flow = getFlow(section);
  const ids = flow.stillWrongIds.length ? flow.stillWrongIds : flow.originalWrongIds;
  ids.forEach(id => { setVal(id, ""); clearRetryAnswer(id); }); 
  setFlow(section, { stage: "practice", practiceIds: ids, stillWrongIds: [] });
  render();
}

function submitPractice(section) {
  const flow = getFlow(section);
  const ids = flow.practiceIds;
  const qs = activeQuestions.filter(q => ids.includes(q.id));
  const stillWrong = qs.filter(q => checkQuestion(q) !== true).map(q => q.id);
  
  qs.forEach(q => {
    if (checkQuestion(q) === true) recordTrickySuccess(q.id);
    else recordMistake(q.id);
  });
  
  setFlow(section, { stage: "practice_done", stillWrongIds: stillWrong });
  render();
}

function submitTrickyPractice() {
  let correctCount = 0;
  activeQuestions.forEach(q => {
    const isCorrect = checkTrickyQuestion(q) === true; // NEW: check tricky values, not retry values
    if (isCorrect) {
      correctCount++;
      recordTrickySuccess(q.id);
      markUI(q.id, true, "Correct! Getting closer to mastery.", false);
    } else {
      recordMistake(q.id);
      markUI(q.id, false, `Still tricky. Answer: ${answerText(q)}`, true);
    }
  });
  
  document.getElementById("tricky-result").innerHTML = `<strong>Marked: ${correctCount}/${activeQuestions.length} correct.</strong> Keep practicing to clear your list!`;
  document.querySelector("[data-action='submit-tricky']").style.display = "none";
}

// ==========================================
// 7. VISUAL FEEDBACK
// ==========================================
function markUI(id, isCorrect, text, isManual=false) {
  const fb = document.getElementById(`fb-${id}`);
  if(!fb) return;
  fb.className = "feedback";
  if(isManual) { fb.classList.add("manual"); fb.textContent = text; }
  else if(isCorrect) { fb.classList.add("correct"); fb.textContent = text; }
  else { fb.classList.add("wrong"); fb.textContent = text; }
}

function showMarkedFeedback() {
  SECTIONS.forEach(section => {
    const flow = getFlow(section);
    const retryIds = new Set((flow.originalWrongIds || []).map(Number));
    const revealIds = new Set((flow.stillWrongIds || []).map(Number));
    
    activeQuestions.filter(q => q.section === section).forEach(q => {
      if(q.type === "manual") {
        if(markedSections[section]) markUI(q.id, null, "Parent-check.", true);
        return;
      }
      
      if(flow.stage === "retrying" && retryIds.has(q.id)) markUI(q.id, false, "Not quite. Try this one again.", false);
      else if(flow.stage === "retry_done" && retryIds.has(q.id)) {
        if(revealIds.has(q.id)) markUI(q.id, false, `Still not quite. Answer: ${answerText(q)}`, false);
        else markUI(q.id, true, "Correct on retry.", false);
      }
      else if(flow.stage === "practice_done" && flow.practiceIds.includes(q.id)) {
        if(revealIds.has(q.id)) markUI(q.id, false, `Not quite. Answer: ${answerText(q)}`, false);
        else markUI(q.id, true, "Correct.", false);
      }
      else if(markedSections[section] || flow.stage === "complete") {
        const isC = checkQuestion(q);
        if(isC === true) markUI(q.id, true, "Correct.", false);
        else if(isC === false) markUI(q.id, false, "Incorrect.", false);
      }
    });
    updateSectionStatus(section);
  });
}

function updateSectionStatus(section) {
  const status = document.getElementById(`result-${SECTIONS.indexOf(section)}`);
  if(!status) return;
  const flow = getFlow(section);
  status.className = "section-result marked";
  
  if(flow.stage === "retrying") status.textContent = `You got ${flow.wrongIds.length} wrong. Try them again below.`;
  else if(flow.stage === "retry_done") status.textContent = `Retry marked: ${flow.retryScoreCorrect}/${flow.total} correct.`;
  else if(flow.stage === "practice") status.textContent = `Targeted practice: New numbers generated based on earlier mistakes.`;
  else if(flow.stage === "practice_done") status.textContent = `Practice marked. Answer shown for any still wrong.`;
  else if(markedSections[section]) {
    const qs = activeQuestions.filter(q => q.section === section && q.type !== "manual");
    const correct = qs.filter(q => checkQuestion(q) === true).length;
    status.textContent = `Section marked: ${correct}/${qs.length} automatically marked questions correct.`;
  }
}

function updateScore() {
  const qs = activeQuestions.filter(q => markedSections[q.section] && q.type !== "manual");
  const correct = qs.filter(q => checkQuestion(q) === true).length;
  document.getElementById("score").textContent = `Marked score: ${correct}/${qs.length}`;
}
function updateProgress() {
  const attempted = activeQuestions.filter(isAttempted).length;
  document.getElementById("progressBar").style.width = Math.round(attempted / activeQuestions.length * 100) + "%";
}
