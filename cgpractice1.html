<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Year 5–7 Maths Bridge Practice — Section marking</title>
<style>
:root{
  --bg:#FFF6ED; --card:#fff; --ink:#1f2328; --muted:#7a8394; --line:#e4e8f0;
  --accent:#3b5bdb; --good:#16803c; --bad:#b42318; --warn:#946200; --soft:#eef2ff;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{background:var(--card);border-bottom:2px solid #FFE0C2;padding:18px 22px;position:sticky;top:0;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.05)}
h1{font-size:1.6rem;font-weight:800;margin:0 0 6px}
.sub{color:var(--muted);font-size:1rem;line-height:1.4;font-weight:500}
main{max-width:1000px;margin:22px auto;padding:0 16px 50px}
.panel,.section,.summary{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.panel{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
select,button,input[type=text],input[type=number]{font:inherit;border:2px solid var(--line);border-radius:12px;padding:10px 13px;background:#fff;font-size:1rem}
button{cursor:pointer;background:var(--accent);color:white;border-color:var(--accent);font-weight:700;border-radius:14px;padding:10px 18px;transition:opacity .15s}
button:hover{opacity:.88}
button.secondary{background:#fff;color:var(--ink);border-color:var(--line);font-weight:600}
button.danger{background:#fff;color:var(--bad);border-color:#efb7b2;font-weight:600}
.score{margin-left:auto;font-weight:800;font-size:1.05rem}
.progress{height:12px;background:#FFE8D0;border-radius:999px;overflow:hidden;margin-top:12px}
.bar{height:100%;width:0%;background:var(--accent);border-radius:999px}
h2{font-size:1.35rem;font-weight:800;margin:0 0 14px}
.q{border-top:2px solid var(--line);padding:18px 0}
.q:first-of-type{border-top:none}
.prompt{font-size:1.1rem;line-height:1.55;margin-bottom:12px;font-weight:500}
.qid{color:var(--accent);font-weight:800;margin-right:7px;font-size:1.1rem}
.answer-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.field{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:5px 0}
.field label{color:var(--muted);font-size:.97rem;font-weight:600}
input[type=text], input[type=number]{min-width:150px}
.choice{display:block;margin:8px 0;padding:11px 14px;border:2px solid var(--line);border-radius:14px;background:#fff;max-width:620px;font-size:1rem;cursor:pointer;transition:border-color .15s}
.choice:hover{border-color:var(--accent)}
.choice input{margin-right:10px}
.feedback{min-height:1.4em;margin-top:10px;font-size:1rem;font-weight:600}
.section-result{margin:8px 0 14px;padding:12px 16px;border-radius:14px;background:#FFF9F2;border:2px solid #FFE0C2;font-size:.97rem;color:var(--muted);font-weight:500}
.section-result.marked{color:var(--ink);font-weight:700}
.correct{color:var(--good);font-weight:700}
.wrong{color:var(--bad);font-weight:700}
.manual{color:var(--warn);font-weight:700}
.hint{font-size:.9rem;color:var(--muted);margin-top:6px;font-weight:500}
.hidden{display:none}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.summary-item{background:#FFF9F2;border:2px solid #FFE0C2;border-radius:16px;padding:14px;line-height:1.6;font-weight:500}
.badge{display:inline-block;background:#FFF0E0;color:#a05500;border-radius:999px;padding:2px 10px;font-size:.83rem;margin-left:6px;font-weight:700;border:1px solid #FFD4A8}
.section-submit-row{margin-top:20px;padding-top:18px;border-top:2px solid var(--line)}
.section-submit-btn{width:100%;padding:14px;font-size:1.05rem;font-weight:800;border-radius:16px;background:var(--accent);color:#fff;border:none;cursor:pointer;transition:opacity .15s}
.section-submit-btn:hover{opacity:.88}
.regen-btn{margin-left:10px;padding:6px 10px;font-size:.88rem;border-radius:10px;background:#fff;color:var(--accent);border:2px solid var(--line);font-weight:700;vertical-align:middle}
.regen-btn:hover{border-color:var(--accent);opacity:.95}
@media print{
  header,.panel,.summary,.section-submit-row{display:none}
  body{background:white}
  main{max-width:none}
  .section{box-shadow:none;border:none}
  .feedback,.hint{display:none}
}
</style>
</head>
<body>
<header>
  <h1>&#127775; Year 5–7 Maths Bridge Practice</h1>
  <div class="sub">Complete each section, then click Mark to check your answers ✓</div>
  <div class="progress"><div class="bar" id="progressBar"></div></div>
</header>
<main>
  <div class="panel">
    <label for="sectionSelect">Section:</label>
    <select id="sectionSelect"></select>
    <button id="showAllBtn" class="secondary">Show all sections</button>
    <button id="summaryBtn" class="secondary">Summary</button>
    <button id="resetBtn" class="danger">Clear answers</button>
    <div class="score" id="score">Marked score: 0/0</div>
  </div>
  <div id="sectionWrap"></div>
  <div class="summary hidden" id="summaryBox">
    <h2>Progress summary</h2>
    <div class="summary-grid" id="summaryGrid"></div>
    <p class="hint">Parent-check questions are saved but not included in the automatic score.</p>
  </div>
</main>

ction 3: Word problems and model thinking", "prompt": "Mei has 48 marbles. She has 12 more marbles than Ravi. How many marbles do they have altogether?", "type": "number", "answers": [84]}, {"id": 23, "section": "Section 3: Word problems and model thinking", "prompt": "A book costs $18. A game costs 4 times as much as the book. What is the total cost of the book and the game?", "type": "number", "answers": [90]}, {"id": 24, "section": "Section 3: Word problems and model thinking", "prompt": "A number is doubled, then 9 is added. The result is 53. What is the number?", "type": "number", "answers": [22]}, {"id": 25, "section": "Section 3: Word problems and model thinking", "prompt": "Three children share some cards. Anna gets twice as many as Bala. Chloe gets 10 more than Bala. Bala gets 15 cards. How many cards are there altogether?", "type": "number", "answers": [70]}, {"id": 26, "section": "Section 3: Word problems and model thinking", "prompt": "A shop had some apples. It sold 125 apples in the morning and 98 apples in the afternoon. It had 77 apples left. How many apples did it have at first?", "type": "number", "answers": [300]}, {"id": 27, "section": "Section 3: Word problems and model thinking", "prompt": "A ribbon is cut into three pieces. The first piece is 25 cm. The second piece is twice as long as the first. The third piece is 15 cm shorter than the second. What is the total length of the ribbon?", "type": "number", "answers": [110]}, {"id": 28, "section": "Section 3: Word problems and model thinking", "prompt": "A number is divided by 5, then 7 is added. The result is 19. What is the original number?", "type": "number", "answers": [60]}, {"id": 29, "section": "Section 3: Word problems and model thinking", "prompt": "Lina has $64. She spends 3/8 of her money. How much money does she have left?", "type": "number", "answers": [40]}, {"id": 30, "section": "Section 3: Word problems and model thinking", "prompt": "Two numbers have a sum of 84. One number is 18 more than the other.", "type": "multi", "fields": [{"label": "Smaller number", "kind": "number", "answers": [33]}, {"label": "Larger number", "kind": "number", "answers": [51]}]}, {"id": 31, "section": "Section 4: Patterns, sequences, and rules", "prompt": "Continue the sequence: 6, 11, 16, 21, ___, ___, ___", "type": "multi", "fields": [{"label": "Next term 1", "kind": "number", "answers": [26]}, {"label": "Next term 2", "kind": "number", "answers": [31]}, {"label": "Next term 3", "kind": "number", "answers": [36]}]}, {"id": 32, "section": "Section 4: Patterns, sequences, and rules", "prompt": "What is the rule for this sequence? 4, 8, 16, 32, 64, ...", "type": "mcq", "choices": ["Add 4 each time", "Multiply by 2 each time", "Multiply by 4 each time", "Add 8 each time"], "answer": 1}, {"id": 33, "section": "Section 4: Patterns, sequences, and rules", "prompt": "Find the 10th term: 3, 7, 11, 15, ...", "type": "number", "answers": [39]}, {"id": 34, "section": "Section 4: Patterns, sequences, and rules", "prompt": "A sequence starts at 12 and increases by 6 each time. What is the 15th term?", "type": "number", "answers": [96]}, {"id": 35, "section": "Section 4: Patterns, sequences, and rules", "prompt": "Is 94 in this sequence? 4, 10, 16, 22, ...", "type": "mcq", "choices": ["Yes", "No"], "answer": 0}, {"id": 36, "section": "Section 4: Patterns, sequences, and rules", "prompt": "Complete the output for input 5: Input 1,2,3,4,5 gives Output 5,8,11,14,___", "type": "number", "answers": [17]}, {"id": 37, "section": "Section 4: Patterns, sequences, and rules", "prompt": "The rule is: multiply by 4, then subtract 1. Find the output when the input is 9.", "type": "number", "answers": [35]}, {"id": 38, "section": "Section 4: Patterns, sequences, and rules", "prompt": "The output is found by doubling the input and adding 3. What is the output when the input is 12?", "type": "number", "answers": [27]}, {"id": 39, "section": "Section 4: Patterns, sequences, and rules", "prompt function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function choose(arr){return arr[randInt(0,arr.length-1)];}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}
function simpFrac(n,d){const g=gcd(n,d); n/=g; d/=g; return d===1 ? String(n) : `${n}/${d}`;}
function fracValStr(n,d){return simpFrac(n,d);}
function shuffled(arr){return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);}
function setQ(q, data){Object.assign(q, data);}

  94(q){const b=randInt(5,25), div=randInt(3,9); setQ(q,{prompt:`Solve: b ÷ ${div} = ${b}`, type:"number", answers:[b*div]});},
  95(q){const x=randInt(3,20), m=randInt(2,6), add=randInt(1,15); setQ(q,{prompt:`Solve: ${m}x + ${add} = ${m*x+add}`, type:"number", answers:[x]});},
  96(q){const y=randInt(3,20), m=randInt(2,6), sub=randInt(1,15); setQ(q,{prompt:`Solve: ${m}y − ${sub} = ${m*y-sub}`, type:"number", answers:[y]});},
  101(q){const l=randInt(6,20), w=randInt(4,15); setQ(q,{prompt:`A rectangle has length ${l} cm and width ${w} cm.`, type:"multi", fields:[{label:"Perimeter",kind:"number",answers:[2*(l+w)]},{label:"Area",kind:"number",answers:[l*w]}]});},
  102(q){const side=randInt(6,20); setQ(q,{prompt:`A square has perimeter ${4*side} cm. Find its area.`, type:"number", answers:[side*side]});},
  105(q){const a=randInt(30,80), b=randInt(30,80); setQ(q,{prompt:`The angles in a triangle are ${a}°, ${b}°, and x°. Find x.`, type:"number", answers:[180-a-b]});},
  107(q){const l=randInt(4,12), w=randInt(3,10), h=randInt(2,8); setQ(q,{prompt:`A cuboid has length ${l} cm, width ${w} cm, and height ${h} cm. Find its volume.`, type:"number", answers:[l*w*h]});},
  111(q){const start=randInt(2,15), step=randInt(3,9), nth=randInt(15,30); setQ(q,{prompt:`A sequence starts at ${start} and increases by ${step} each time. What is the ${nth}th term?`, type:"number", answers:[start+(nth-1)*step]});},
  112(q){const n=randInt(3,15), m=randInt(2,8), sub=randInt(1,15); setQ(q,{prompt:`If n = ${n}, find the value of ${m}n − ${sub}.`, type:"number", answers:[m*n-sub]});},
  113(q){const x=randInt(3,20), m=randInt(2,8), add=randInt(1,15); setQ(q,{prompt:`Solve: ${m}x + ${add} = ${m*x+add}`, type:"number", answers:[x]});},
  114(q){const pct=choose([10,20,25,50]); const original=randInt(20,100); setQ(q,{prompt:`A number is increased by ${pct}%, giving ${original*(100+pct)/100}. What was the original number?`, type:"number", answers:[original]});},
  118(q){const mean=randInt(10,30), nums=[randInt(5,25),randInt(5,25),randInt(5,25),randInt(5,25)]; const fifth=mean*5-nums.reduce((a,b)=>a+b,0); if(fifth<=0){return similarGenerators[118](q);} setQ(q,{prompt:`The mean of five numbers is ${mean}. Four of the numbers are ${nums[0]}, ${nums[1]}, ${nums[2]}, and ${nums[3]}. What is the fifth number?`, type:"number", answers:[fifth]});},
  120(q){const fee=randInt(2,8), per=randInt(2,6), km=randInt(6,15); setQ(q,{prompt:`A taxi charges a fixed fee of $${fee} plus $${per} for every kilometre travelled.`, type:"multi", fields:[{label:`Cost for ${km} km`,kind:"number",answers:[fee+per*km]},{label:"Which expression gives the cost for k km?",kind:"mcq",choices:[`${fee}k + ${per}`,`${per}k + ${fee}`,`${per}(k + ${fee})`,`k + ${fee+per}`],answer:1}]});}
};

function regenerateQuestion(id){
  const q=questions.find(x=>x.id===id);
  if(!q || !similarGenerators[id]) return;
  similarGenerators[id](q);
  clearQuestionAnswer(id);
  markedSections[q.section]=false;
  saveMarkedSections();
  render();
  const target=document.getElementById(`q-${id}`);
  if(target) target.scrollIntoView({behavior:"smooth", block:"center"});
}

function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}
function norm(s){return String(s ?? "").trim().toLowerCase().replace(/,/g,"").replace(/\$/g,"").replace(/\s+/g," ");}
function numeric(s){let v=norm(s); if(v==="") return NaN; return Number(v);}
function nearly(a,b){return Math.abs(a-b)<1e-9;}

function fracValue(s){
  s = norm(s).replace(/\s/g,"");
  if(s.includes("/")){
    const [a,b] = s.split("/").map(Number);
    if(!Number.isFinite(a)||!Number.isFinite(b)||b===0) return NaN;
    return a/b;
  }
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}

function getVal(id){return saved[id] ?? "";}
function setVal(id,val){saved[id]=val; localStorage.setItem(KEY,JSON.stringify(saved)); updateProgress();}
function sectionIndex(section){return sections.indexOf(section);}
function sectionStatusId(section){return `section-result-${sectionIndex(section)}`;}
function saveMarkedSections(){localStorage.setItem(MARKED_KEY, JSON.stringify(markedSections));}
function clearFeedbackForSection(section){
  questions.filter(q=>q.section===section).forEach(q=>{
    const fb=document.getElementById(`fb-${q.id}`);
    if(fb){fb.className="feedback"; fb.textContent="";}
  });
  const status=document.getElementById(sectionStatusId(section));
  if(status){status.className="section-result"; status.textContent="Answers changed. Click ‘Mark visible section’ when this section is complete.";}
}
function saveAnswer(id,val){
  const q=questions.find(x=>x.id===id);
  setVal(id,val);
  if(q){markedSections[q.section]=false; saveMarkedSections(); clearFeedbackForSection(q.section);}
  updateScore();
}

function checkField(field, val){
  if(!norm(val)) return null;
  if(field.kind==="number"){
    const n = numeric(val);
    return field.answers.some(a => nearly(n, Number(a)));
  }
  if(field.kind==="fraction"){
    const v = fracValue(val);
    return field.answers.some(a => nearly(v, fracValue(a)));
  }
  if(field.kind==="mcq"){
    return String(val) === String(field.answer);
  }
  return null;
}

function checkQuestion(q){
  if(q.type==="manual"){
    return norm(getVal(q.id)) ? "manual" : null;
  }
  if(q.type==="number"){
    return checkField({kind:"number",answers:q.answers}, getVal(q.id));
  }
  if(q.type==="fraction"){
    return checkField({kind:"fraction",answers:q.answers}, getVal(q.id));
  }
  if(q.type==="mcq"){
    return checkField({kind:"mcq",answer:q.answer}, getVal(q.id));
  }
  if(q.type==="multi"){
    const vals = getVal(q.id) || {};
    let any=false, all=true;
    q.fields.forEach((f,idx)=>{
      const r = checkField(f, vals[idx]);
      if(r!==null) any=true;
      if(r!==true) all=false;
    });
    if(!any) return null;
    return all;
  }
  return null;
}

function isAttempted(q){
  if(q.type==="multi"){
    const vals = getVal(q.id) || {};
    return q.fields.some((_,idx)=>norm(vals[idx]));
  }
  return norm(getVal(q.id));
}

function isAuto(q){return q.type !== "manual";}

function inputHtml(q){
  if(q.type==="number" || q.type==="fraction"){
    return `<input type="text" inputmode="decimal" id="ans-${q.id}" value="${esc(getVal(q.id))}" placeholder="Type answer">`;
  }
  if(q.type==="manual"){
    return `<input type="text" id="ans-${q.id}" value="${esc(getVal(q.id))}" placeholder="Type answer for parent to check">
            <div class="hint">Ask a parent to check this answer after you finish the section.</div>`;
  }
  if(q.type==="mcq"){
    const cur = getVal(q.id);
    return q.choices.map((c,idx)=>`
      <label class="choice">
        <input type="radio" name="ans-${q.id}" value="${idx}" ${String(cur)===String(idx)?"checked":""}>
        ${esc(c)}
      </label>`).join("");
  }
  if(q.type==="multi"){
    const vals = getVal(q.id) || {};
    return `<div class="answer-row">` + q.fields.map((f,idx)=>{
      if(f.kind==="mcq"){
        const cur = vals[idx] ?? "";
        return `<div class="field"><label>${esc(f.label)}:</label><select id="ans-${q.id}-${idx}">
          <option value="">Choose</option>
          ${f.choices.map((c,i)=>`<option value="${i}" ${String(cur)===String(i)?"selected":""}>${esc(c)}</option>`).join("")}
        </select></div>`;
      }
      return `<div class="field"><label>${esc(f.label)}:</label><input type="text" inputmode="decimal" id="ans-${q.id}-${idx}" value="${esc(vals[idx] ?? "")}" placeholder="Answer"></div>`;
    }).join("") + `</div>`;
  }
}

function renderSelect(){
  const sel=document.getElementById("sectionSelect");
  sel.innerHTML=sections.map((s,i)=>`<option value="${esc(s)}">${i+1}. ${esc(s.replace(/^Section \d+: /,""))}</option>`).join("");
}

function render(){
  const selected=document.getElementById("sectionSelect").value || sections[0];
  const wrap=document.getElementById("sectionWrap");
  wrap.innerHTML="";
  sections.forEach(section=>{
    if(!showAll && section!==selected) return;
    const div=document.createElement("section");
    div.className="section";
    div.innerHTML=`<h2>${esc(section)}</h2><div class="section-result" id="${sectionStatusId(section)}">Complete this section, then click ‘Mark visible section’.</div>` + questions.filter(q=>q.section===section).map(q=>`
      <div class="q" id="q-${q.id}">
        <div class="prompt"><span class="qid">${q.id}.</span>${esc(q.prompt)}${q.type==="manual" ? '<span class="badge">Parent-check</span>' : ''}${canGenerate(q) ? `<button class="regen-btn" data-regen="${q.id}" title="Make a new question with the same skill">New similar question</button>` : ''}</div>
        ${inputHtml(q)}
        <div class="feedback" id="fb-${q.id}"></div>
      </div>
    `).join("") + `<div class="section-submit-row"><button class="section-submit-btn" data-section="${esc(section)}">Submit section ✓</button></div>`;
    wrap.appendChild(div);
  });
  attachHandlers();
  showMarkedFeedback();
  updateProgress();
  updateScore();
}

function attachHandlers(){
  document.querySelectorAll('.regen-btn').forEach(btn=>{
    btn.addEventListener('click',()=>regenerateQuestion(Number(btn.dataset.regen)));
  });
  document.querySelectorAll('.section-submit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      markSection(btn.dataset.section, true);
      updateScore();
      updateSummary();
    });
  });
  questions.forEach(q=>{
    if(q.type==="number"||q.type==="fraction"||q.type==="manual"){
      const el=document.getElementById(`ans-${q.id}`);
      if(el) el.addEventListener("input", e=>saveAnswer(q.id,e.target.value));
    } else if(q.type==="mcq"){
      document.querySelectorAll(`input[name="ans-${q.id}"]`).forEach(el=>{
        el.addEventListener("change", e=>saveAnswer(q.id,e.target.value));
      });
    } else if(q.type==="multi"){
      q.fields.forEach((f,idx)=>{
        const el=document.getElementById(`ans-${q.id}-${idx}`);
        if(el) el.addEventListener("input", e=>saveMulti(q.id,idx,e.target.value));
        if(el) el.addEventListener("change", e=>saveMulti(q.id,idx,e.target.value));
      });
    }
  });
}

function saveMulti(id,idx,value){
  const vals = getVal(id) || {};
  vals[idx]=value;
  saveAnswer(id, vals);
}

function mark(id, showEmpty=true){
  const q=questions.find(x=>x.id===id);
  const fb=document.getElementById(`fb-${id}`);
  if(!fb) return;
  const r=checkQuestion(q);
  fb.className="feedback";
  if(r===null){fb.textContent=showEmpty ? "No answer yet." : ""; return;}
  if(r==="manual"){fb.classList.add("manual"); fb.textContent="Parent-check."; return;}
  if(r===true){fb.classList.add("correct"); fb.textContent="Correct."; return;}
  fb.classList.add("wrong"); fb.textContent="Not quite. Check your working.";
}

function markSection(section, showEmpty=true){
  questions.filter(q=>q.section===section).forEach(q=>mark(q.id, showEmpty));
  markedSections[section]=true;
  saveMarkedSections();
  updateSectionStatus(section);
}

function visibleSections(){
  return [...document.querySelectorAll("section.section h2")].map(h=>h.textContent);
}

function markVisible(showEmpty=true){
  visibleSections().forEach(section=>markSection(section, showEmpty));
  updateScore();
  updateSummary();
}

function showMarkedFeedback(){
  visibleSections().forEach(section=>{
    if(markedSections[section]){
      questions.filter(q=>q.section===section).forEach(q=>mark(q.id, false));
      updateSectionStatus(section);
    }
  });
}

function markedStats(section=null){
  const qs = section ? questions.filter(q=>q.section===section) : questions.filter(q=>markedSections[q.section]);
  let correct=0, total=0;
  qs.forEach(q=>{
    if(q.type==="manual") return;
    total++;
    if(checkQuestion(q)===true) correct++;
  });
  return {correct,total};
}

function updateSectionStatus(section){
  const status=document.getElementById(sectionStatusId(section));
  if(!status) return;
  if(!markedSections[section]){
    status.className="section-result";
    status.textContent="Complete this section, then click ‘Mark visible section’.";
    return;
  }
  const s=stats(section);
  status.className="section-result marked";
  const parentText = s.manual ? ` Parent-check questions: ${s.manual}.` : "";
  status.textContent = `Section marked: ${s.correct}/${s.total} automatically marked questions correct.${parentText}`;
}

function stats(section=null){
  const qs = section ? questions.filter(q=>q.section===section) : questions;
  let correct=0, total=0, attempted=0, manual=0;
  qs.forEach(q=>{
    if(q.type==="manual"){manual++; return;}
    total++;
    if(isAttempted(q)) attempted++;
    if(checkQuestion(q)===true) correct++;
  });
  return {correct,total,attempted,manual};
}

function updateScore(){
  const s=markedStats();
  document.getElementById("score").textContent=`Marked score: ${s.correct}/${s.total}`;
}

function updateProgress(){
  const attempted=questions.filter(isAttempted).length;
  document.getElementById("progressBar").style.width = Math.round(attempted/questions.length*100)+"%";
}

function updateSummary(){
  const grid=document.getElementById("summaryGrid");
  grid.innerHTML=sections.map((sec,i)=>{
    const s=stats(sec);
    const marked = !!markedSections[sec];
    const correctLine = marked ? `Correct: ${s.correct}/${s.total}` : "Correct: Not marked yet";
    return `<div class="summary-item"><strong>Section ${i+1}</strong><br>${correctLine}<br>Attempted: ${s.attempted}/${s.total}<br>Parent-check: ${s.manual}</div>`;
  }).join("");
}

document.getElementById("sectionSelect").addEventListener("change",()=>{showAll=false;document.getElementById("showAllBtn").textContent="Show all sections";render();});
document.getElementById("showAllBtn").addEventListener("click",()=>{showAll=!showAll;document.getElementById("showAllBtn").textContent=showAll?"Show one section":"Show all sections";render();});
document.getElementById("summaryBtn").addEventListener("click",()=>{document.getElementById("summaryBox").classList.toggle("hidden");updateSummary();});
document.getElementById("resetBtn").addEventListener("click",()=>{if(confirm("Clear all saved answers?")){saved={}; markedSections={}; localStorage.removeItem(KEY); localStorage.removeItem(MARKED_KEY); render();updateSummary();}});

renderSelect();
render();
</script>
</body>
</html>
